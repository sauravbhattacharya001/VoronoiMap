---
name: ⚡ Performance Issue
description: Report slow computation, excessive memory usage, or scalability problems
title: "[Perf]: "
labels: ["performance", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report performance problems — slow runtimes, high memory usage, or poor scaling with dataset size.

  - type: textarea
    id: description
    attributes:
      label: Performance Problem
      description: Describe the performance issue. What operation is slow or resource-intensive?
      placeholder: "vormap_cluster.py takes >30 minutes on a 10k-point dataset with DBSCAN..."
    validations:
      required: true

  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark Details
      description: |
        Provide timing/memory measurements. Include dataset size, parameters used, and observed runtime.
      placeholder: |
        Dataset: 10,000 points, 2D Euclidean
        Command: `python vormap.py data.csv --samples 5000`
        Wall time: 47 minutes
        Peak memory: 3.2 GB
        Expected: < 5 minutes based on O(n log n) complexity
      render: text
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which module or stage of the pipeline is slow?
      multiple: true
      options:
        - Voronoi estimation (vormap.py)
        - Clustering (vormap_cluster.py)
        - Spatial analysis (vormap_hotspot.py)
        - Network analysis (vormap_network.py)
        - Visualization (vormap_viz.py)
        - Report generation (vormap_report.py)
        - PSO optimization (vormap_pso.py)
        - File I/O / data loading
        - Other
    validations:
      required: true

  - type: dropdown
    id: dataset-scale
    attributes:
      label: Dataset Scale
      description: Approximate number of data points
      options:
        - Small (< 1,000 points)
        - Medium (1,000 – 10,000 points)
        - Large (10,000 – 100,000 points)
        - Very large (> 100,000 points)
    validations:
      required: true

  - type: textarea
    id: profiling
    attributes:
      label: Profiling Output (if available)
      description: "Output from `python -m cProfile`, `py-spy`, or `memory_profiler`. Attach flame graphs if possible."
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, OS, CPU/RAM, relevant package versions (numpy, scipy)."
      placeholder: |
        Python 3.11.4
        Ubuntu 22.04, 8-core, 16 GB RAM
        numpy 1.26.0, scipy 1.12.0
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have included timing or memory measurements
          required: true
        - label: I am using the latest version of VoronoiMap
          required: false
