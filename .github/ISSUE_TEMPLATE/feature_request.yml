---
name: ✨ Feature Request
description: Suggest a new feature or enhancement for VoronoiMap
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for VoronoiMap? We'd love to hear it! Please describe the feature and why it would be valuable.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration with the current behavior?
      placeholder: "I'm always frustrated when I need to export results to Shapefile format but only GeoJSON is supported..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Core Algorithm (EstimateSUM, Voronoi partitioning)
        - CLI Interface
        - Python API
        - Visualization (SVG/HTML/GeoJSON export)
        - Performance / Scalability
        - Data Formats (input/output)
        - Documentation
        - Testing / CI
        - Other
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected Impact
      description: How many users would benefit from this feature?
      options:
        - Low — niche use case
        - Medium — useful for many workflows
        - High — fundamental improvement
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, code snippets, or references (e.g., papers, related tools).

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
          required: false
