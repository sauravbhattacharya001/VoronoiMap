---
name: 🎯 Algorithm / Accuracy Issue
description: Report incorrect results, numerical instability, or unexpected statistical output
title: "[Accuracy]: "
labels: ["accuracy", "algorithm", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report issues with algorithmic correctness — wrong estimates, numerical instability, degenerate geometry handling, or unexpected statistical results.

  - type: textarea
    id: description
    attributes:
      label: Accuracy Problem
      description: Describe the incorrect or unexpected result. What did the algorithm produce vs. what you expected?
      placeholder: "EstimateSUM returns negative area estimates for collinear point configurations..."
    validations:
      required: true

  - type: textarea
    id: input-data
    attributes:
      label: Input Data / Reproduction
      description: |
        Provide minimal input data (CSV/JSON or inline coordinates) and the exact command or API call that produces the incorrect result.
      placeholder: |
        points = [(0,0), (1,1), (2,2), (3,3)]  # collinear
        result = vormap.estimate_sum(points, samples=100)
        # Expected: ~4.0, Got: -2.31e+15
      render: python
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected Result
      description: What is the correct or expected output? Include references, ground-truth values, or mathematical reasoning.
    validations:
      required: true

  - type: textarea
    id: actual-result
    attributes:
      label: Actual Result
      description: What does VoronoiMap actually produce? Include full output, numerical values, or error messages.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Issue Category
      description: What kind of accuracy problem is this?
      options:
        - Incorrect aggregate estimate (SUM/COUNT/AVG)
        - Numerical instability (NaN, Inf, overflow)
        - Degenerate geometry (collinear, coincident, boundary)
        - Clustering quality (wrong clusters, missed outliers)
        - Spatial analysis error (hotspot, network, adjacency)
        - Voronoi cell computation error
        - Statistical test result (significance, p-value)
        - Other
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How consistently does this occur?
      options:
        - Always (deterministic)
        - Usually (> 80% of runs)
        - Sometimes (random seed dependent)
        - Rare (specific data configurations only)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, OS, numpy/scipy versions."
      placeholder: "Python 3.11.4, numpy 1.26.0, scipy 1.12.0"
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have included minimal reproduction data
          required: true
        - label: I have verified the issue with the latest version
          required: false
