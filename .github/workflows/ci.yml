name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install flake8 ruff

      - name: Run ruff (fast lint + format check)
        run: |
          ruff check vormap.py vormap_pattern.py --select=E,F,W,I --ignore=E501
          ruff format --check vormap.py vormap_pattern.py || true

      - name: Run flake8
        run: |
          # Stop on syntax errors or undefined names (real bugs)
          flake8 vormap.py vormap_pattern.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 vormap.py vormap_pattern.py --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12", "3.13"]
        exclude:
          # macOS ARM runners don't ship Python 3.9
          - os: macos-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test data directory
        run: mkdir -p data
        shell: bash

      - name: Create test data file
        run: |
          cat > data/test_points.txt << 'EOF'
          100.0 200.0
          300.0 400.0
          500.0 600.0
          700.0 800.0
          150.0 750.0
          EOF
        shell: bash

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=vormap --cov-report=xml --cov-report=term-missing -x -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify module imports cleanly (no deps)
        run: |
          python -c "import vormap; print('Module imported successfully')"
          python -c "import vormap_pattern; print('Pattern module imported successfully')"

      - name: Install optional deps and re-check
        run: |
          pip install -r requirements.txt
          python -c "
          import vormap
          assert vormap._HAS_SCIPY, 'scipy should be available'
          print('Module imported with scipy support')
          "

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --strict --desc on

  package-build:
    name: Package Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl
          python -c "import vormap; print(f'Installed voronoimap {vormap.__version__}' if hasattr(vormap, '__version__') else 'Installed voronoimap')"
