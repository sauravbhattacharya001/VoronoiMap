# Auto-label PRs based on changed file paths.
# Docs: https://github.com/actions/labeler
#
# Design rules:
#   * Use ONLY labels that exist in the repo (see `gh label list`).
#   * Prefer descriptive labels (testing, ci/cd, visualization, …) over
#     status labels (bug, enhancement) — those belong on issues, not PRs.
#   * Keep each section narrow enough to convey signal. A label that lights
#     up on every PR carries no information.

# ---------------------------------------------------------------------------
# Cross-cutting categories
# ---------------------------------------------------------------------------

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'docs-src/**'
          - '*.md'
          - 'mkdocs.yml'
          - '.github/copilot-instructions.md'
          - '.github/ISSUE_TEMPLATE/**'
          - '.github/PULL_REQUEST_TEMPLATE.md'

ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
          - '.github/issue-labeler.yml'
          - '.github/copilot-setup-steps.yml'
          - '.coveragerc'
          - 'codecov.yml'

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - '.dockerignore'
          - '.gitignore'
          - 'MANIFEST.in'
          - 'pyproject.toml'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'requirements.txt'
          - 'requirements-*.txt'
          - 'pyproject.toml'
          - '.github/dependabot.yml'

testing:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - 'test_*.py'
          - '*_test.py'
          - 'conftest.py'
          - '.coveragerc'
          - 'sdk/tests/**'

# ---------------------------------------------------------------------------
# Domain categories (modules that affect a specific concern)
# ---------------------------------------------------------------------------

