site_name: VoronoiMap Documentation
site_description: Estimate aggregate statistics of unknown point sets using Voronoi partitioning and nearest-neighbor oracles
site_url: https://sauravbhattacharya001.github.io/VoronoiMap/
repo_url: https://github.com/sauravbhattacharya001/VoronoiMap
repo_name: sauravbhattacharya001/VoronoiMap
edit_uri: edit/master/docs-src/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sauravbhattacharya001/VoronoiMap

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - CLI Reference: guide/cli.md
    - Python API: guide/api.md
    - Extension Modules: guide/extensions.md
    - Benchmarking & Performance: guide/benchmarking.md
    - Data Format: guide/data-format.md
  - Algorithm:
    - Overview: algorithm/overview.md
    - Implementation Details: algorithm/implementation.md
  - Contributing: contributing.md
  - Changelog: changelog.md

docs_dir: docs-src
